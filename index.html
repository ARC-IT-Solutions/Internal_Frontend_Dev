<!DOCTYPE html>
<html lang="en" data-role="agent">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Lead Console</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div id="app">

  <!-- ════════════ TOP BAR ════════════ -->
  <header class="topbar" role="banner">
    <div class="brand">
      <div class="brand-dot"></div>
      Lead Console
    </div>

    <span id="unread-badge" class="unread-badge" aria-live="polite" style="display:none">0</span>
    <div class="topbar-divider"></div>
    <span id="sync-time" aria-live="polite">Connecting...</span>

    <div class="topbar-spacer"></div>

    <button id="sound-toggle" class="topbar-btn" aria-pressed="true">🔔 Sound</button>
    <div class="topbar-divider"></div>

    <!-- User chip with role badge -->
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">AD</div>
      <div class="user-info">
        <span class="user-name" id="user-name">Admin</span>
        <span class="role-badge role-admin" id="user-role-badge">Admin</span>
      </div>
      <button id="logout-btn" class="logout-btn" title="Sign out" aria-label="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ════════════ TAB BAR ════════════ -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="inquiries" role="tab" aria-selected="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
      </svg>
      Inquiries
      <span id="inq-badge" class="tab-badge inq" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="tickets" role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
      </svg>
      Tickets
      <span id="tkt-badge" class="tab-badge tkt" style="display:none">0</span>
    </button>
  </nav>

  <!-- ════════════ NOTIFICATION BAR ════════════ -->
  <div id="notif-bar" class="notif-bar" role="status" aria-live="polite">
    <span id="notif-bar-icon">📥</span>
    <span id="notif-bar-text"></span>
    <button id="notif-bar-close" class="notif-bar-close" aria-label="Dismiss">×</button>
  </div>

  <!-- ════════════ PANELS ════════════ -->
  <div class="panels-area">

    <!-- ── INQUIRIES ────────────────── -->
    <div id="inq-pane" class="module-pane" role="tabpanel">

      <section class="list-side" aria-label="Inquiry list">
        <div class="list-header">
          <span class="list-header-label">Inquiries</span>
          <select id="inq-filter-status" class="filter-sel" aria-label="Filter by status">
            <option value="all">All Status</option>
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="in_progress">In Progress</option>
            <option value="closed">Closed</option>
          </select>
          <span id="inq-count" class="list-count" aria-live="polite"></span>
        </div>
        <div id="inquiry-list" role="listbox" aria-label="Inquiries"></div>
      </section>

      <section class="detail-side" id="inq-detail-pane" aria-label="Inquiry detail">
        <button id="inq-back-btn" class="mobile-back">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Inquiries
        </button>
        <div id="inq-empty" class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/>
          </svg>
          <p>Select an inquiry</p>
        </div>
        <div id="inq-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- ── TICKETS ──────────────────── -->
    <div id="tkt-pane" class="module-pane" role="tabpanel" style="display:none">

      <section class="list-side" aria-label="Ticket list">
        <div class="list-header">
          <span class="list-header-label">Tickets</span>
          <select id="tkt-filter-status" class="filter-sel" aria-label="Filter by status">
            <option value="all">All Status</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="pending">Pending</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
          <select id="tkt-filter-priority" class="filter-sel" aria-label="Filter by priority">
            <option value="all">All Priority</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <span id="tkt-count" class="list-count" aria-live="polite"></span>
        </div>
        <div id="ticket-list" role="listbox" aria-label="Tickets"></div>
      </section>

      <section class="detail-side" id="tkt-detail-pane" aria-label="Ticket detail">
        <button id="tkt-back-btn" class="mobile-back">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Tickets
        </button>
        <div id="tkt-empty" class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
          </svg>
          <p>Select a ticket</p>
        </div>
        <div id="tkt-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

  </div>

  <!-- ════════════ ERROR TOAST ════════════ -->
  <div id="error-toast" role="alert" aria-live="assertive"></div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
