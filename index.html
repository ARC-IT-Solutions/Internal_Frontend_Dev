<!DOCTYPE html>
<html lang="en" data-role="employee">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Lead Console</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div id="app">

  <!-- ══ TOP BAR ══════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="brand"><div class="brand-dot"></div>Lead Console</div>
    <span id="unread-badge" class="unread-badge" style="display:none">0</span>
    <div class="topbar-divider"></div>
    <span id="sync-time">Connecting…</span>
    <div class="topbar-spacer"></div>
    <button id="sound-toggle" class="topbar-btn" aria-pressed="true">🔔 Sound</button>
    <div class="topbar-divider"></div>
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">AD</div>
      <div class="user-info">
        <span class="user-name" id="user-name">Loading…</span>
        <span class="role-badge" id="user-role-badge">—</span>
      </div>
      <button id="logout-btn" class="logout-btn" title="Sign out" aria-label="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══ TAB BAR ══════════════════════════════════════════════ -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="inquiries" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
      Inquiries <span id="inq-badge" class="tab-badge inq" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="tickets" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
      Tickets <span id="tkt-badge" class="tab-badge tkt" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="projects" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Projects
    </button>
    <button class="tab-btn" data-tab="requests" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Requests
    </button>
    <button class="tab-btn" data-tab="invoices" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Invoices
    </button>
    <!-- Admin-only tabs -->
    <button class="tab-btn" data-tab="users" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Users
    </button>
    <button class="tab-btn" data-tab="audit" role="tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      Audit
    </button>
    <button class="tab-btn" data-tab="profile" role="tab" id="profile-btn" style="margin-left:auto">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </button>
  </nav>

  <!-- ══ NOTIF BAR ════════════════════════════════════════════ -->
  <div id="notif-bar" class="notif-bar" role="status" aria-live="polite">
    <span id="notif-bar-icon">📥</span>
    <span id="notif-bar-text"></span>
    <button id="notif-bar-close" class="notif-bar-close">×</button>
  </div>

  <!-- ══ PANELS ═══════════════════════════════════════════════ -->
  <div class="panels-area">

    <!-- INQUIRIES -->
    <div id="inquiries-pane" class="module-pane">
      <section class="list-side">
        <div class="list-header">
          <span class="list-header-label">Inquiries</span>
          <select id="inq-filter-status"   class="filter-sel"><option value="">All Status</option><option>NEW</option><option>CONTACTED</option><option>QUALIFIED</option><option>CONVERTED</option><option>REJECTED</option></select>
          <select id="inq-filter-priority" class="filter-sel"><option value="">All Priority</option><option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>URGENT</option></select>
          <span id="inq-count" class="list-count"></span>
        </div>
        <div id="inquiries-list" role="listbox"></div>
      </section>
      <section class="detail-side" id="inq-detail-pane">
        <button id="inq-back-btn" class="mobile-back">← Inquiries</button>
        <div id="inq-empty" class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg><p>Select an inquiry</p></div>
        <div id="inq-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- TICKETS -->
    <div id="tickets-pane" class="module-pane" style="display:none">
      <section class="list-side">
        <div class="list-header">
          <span class="list-header-label">Tickets</span>
          <select id="tkt-filter-status"   class="filter-sel"><option value="">All Status</option><option>OPEN</option><option>IN_PROGRESS</option><option>WAITING_CLIENT</option><option>RESOLVED</option><option>CLOSED</option></select>
          <select id="tkt-filter-priority" class="filter-sel"><option value="">All Priority</option><option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>URGENT</option></select>
          <span id="tkt-count" class="list-count"></span>
        </div>
        <div id="tickets-list" role="listbox"></div>
      </section>
      <section class="detail-side" id="tkt-detail-pane">
        <button id="tkt-back-btn" class="mobile-back">← Tickets</button>
        <div id="tkt-empty" class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg><p>Select a ticket</p></div>
        <div id="tkt-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- PROJECTS -->
    <div id="projects-pane" class="module-pane" style="display:none">
      <section class="list-side">
        <div class="list-header">
          <span class="list-header-label">Projects</span>
          <select id="proj-filter-status" class="filter-sel"><option value="">All Status</option><option>DRAFT</option><option>PLANNING</option><option>IN_PROGRESS</option><option>ON_HOLD</option><option>REVIEW</option><option>COMPLETED</option><option>CANCELLED</option></select>
          <span id="proj-count" class="list-count"></span>
          <button id="proj-create-btn" class="create-btn" title="New project">+</button>
        </div>
        <div id="projects-list" role="listbox"></div>
      </section>
      <section class="detail-side" id="proj-detail-pane">
        <button id="proj-back-btn" class="mobile-back">← Projects</button>
        <div id="proj-empty" class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><p>Select a project or create one</p></div>
        <div id="proj-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- PROJECT REQUESTS -->
    <div id="requests-pane" class="module-pane" style="display:none">
      <section class="list-side">
        <div class="list-header">
          <span class="list-header-label">Requests</span>
          <select id="req-filter-status" class="filter-sel"><option value="">All Status</option><option>PENDING</option><option>UNDER_REVIEW</option><option>APPROVED</option><option>REJECTED</option><option>CONVERTED</option></select>
          <span id="req-count" class="list-count"></span>
        </div>
        <div id="requests-list" role="listbox"></div>
      </section>
      <section class="detail-side" id="req-detail-pane">
        <button id="req-back-btn" class="mobile-back">← Requests</button>
        <div id="req-empty" class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>Select a project request</p></div>
        <div id="req-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- INVOICES -->
    <div id="invoices-pane" class="module-pane" style="display:none">
      <section class="list-side">
        <div class="list-header">
          <span class="list-header-label">Invoices</span>
          <select id="inv-filter-status" class="filter-sel"><option value="">All Status</option><option>DRAFT</option><option>SENT</option><option>PAID</option><option>OVERDUE</option><option>CANCELLED</option></select>
          <span id="inv-count" class="list-count"></span>
          <button id="inv-create-btn" class="create-btn" title="New invoice">+</button>
        </div>
        <div id="invoices-list" role="listbox"></div>
      </section>
      <section class="detail-side" id="inv-detail-pane">
        <button id="inv-back-btn" class="mobile-back">← Invoices</button>
        <div id="inv-empty" class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Select an invoice or create one</p></div>
        <div id="inv-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- USERS (admin) -->
    <div id="users-pane" class="module-pane" style="display:none">
      <section class="list-side">
        <div class="list-header">
          <span class="list-header-label">Users</span>
          <span id="usr-count" class="list-count"></span>
          <button id="usr-register-btn" class="create-btn" title="Add user">+</button>
        </div>
        <div id="users-list" role="listbox"></div>
      </section>
      <section class="detail-side" id="usr-detail-pane">
        <button id="usr-back-btn" class="mobile-back">← Users</button>
        <div id="usr-empty" class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Select a user or register new</p></div>
        <div id="usr-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

    <!-- AUDIT LOGS (admin) -->
    <div id="audit-pane" class="module-pane" style="display:none">
      <section class="list-side" style="width:100%;border-right:none">
        <div class="list-header">
          <span class="list-header-label">Audit Logs</span>
          <select id="audit-filter-action" class="filter-sel"><option value="">All Actions</option><option>CREATE</option><option>UPDATE</option><option>DELETE</option><option>STATUS_CHANGE</option><option>ASSIGN</option><option>LOGIN</option><option>LOGOUT</option><option>LOGIN_FAILED</option><option>FILE_UPLOAD</option><option>FILE_DOWNLOAD</option><option>PASSWORD_CHANGE</option></select>
          <select id="audit-filter-entity" class="filter-sel"><option value="">All Entities</option><option>user</option><option>project</option><option>project_request</option><option>inquiry</option><option>ticket</option><option>invoice</option><option>auth</option></select>
          <span id="audit-count" class="list-count"></span>
        </div>
        <div id="audit-list" style="flex:1;overflow-y:auto;padding:4px 0"></div>
      </section>
    </div>

    <!-- PROFILE (all) -->
    <div id="profile-pane" class="module-pane" style="display:none">
      <section class="list-side" style="display:none"></section>
      <section class="detail-side" style="flex:1;max-width:600px;margin:0 auto">
        <div id="profile-empty" class="empty-state" style="display:none"></div>
        <div id="profile-detail-body" class="detail-body" style="display:none"></div>
      </section>
    </div>

  </div><!-- /panels-area -->

  <!-- ══ TOASTS ════════════════════════════════════════════════ -->
  <div id="error-toast"   role="alert" aria-live="assertive"></div>
  <div id="success-toast" role="status" aria-live="polite"></div>

</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
