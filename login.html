<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Sign In — Lead Console</title>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>
<div class="login-shell">

  <div class="login-brand-panel">
    <div class="brand-content">
      <div class="brand-mark">
        <div class="brand-dot"></div><div class="brand-dot brand-dot-2"></div><div class="brand-dot brand-dot-3"></div>
      </div>
      <h1 class="brand-name">Lead Console</h1>
      <p class="brand-tagline">Internal operations dashboard<br>for your sales &amp; support team.</p>
      <div class="brand-stats">
        <div class="stat-item"><span class="stat-num">7</span><span class="stat-label">Modules</span></div>
        <div class="stat-item"><span class="stat-num">2</span><span class="stat-label">Roles</span></div>
        <div class="stat-item"><span class="stat-num">15s</span><span class="stat-label">Sync</span></div>
      </div>
    </div>
    <div class="brand-footer">Internal use only · Not for public access</div>
  </div>

  <div class="login-form-panel">
    <div class="form-container">
      <div class="form-header">
        <h2 class="form-title">Sign in</h2>
        <p class="form-sub">Use your company email and password</p>
      </div>

      <div id="login-error" class="alert alert-error" role="alert" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="login-error-text">Invalid credentials.</span>
      </div>

      <div class="form-body">
        <div class="field-group">
          <label class="field-label" for="email">Email address</label>
          <input type="email" id="email" class="field-input" placeholder="you@company.com" autocomplete="email" autofocus/>
        </div>
        <div class="field-group">
          <label class="field-label" for="password">
            Password
            <button type="button" class="forgot-link" id="forgot-btn">Forgot?</button>
          </label>
          <div class="input-wrap">
            <input type="password" id="password" class="field-input" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
              <svg id="pw-eye-show" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="pw-eye-hide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="button" class="submit-btn" id="login-btn">
          <span id="btn-text">Sign in</span>
          <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>
      </div>

      <div class="server-status" id="server-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Checking server…</span>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { login, getSession } from './js/auth.js';
import { ENDPOINTS } from './js/config.js';

if (getSession()) window.location.replace('index.html');

const emailEl = document.getElementById('email');
const pwEl    = document.getElementById('password');
const loginBtn = document.getElementById('login-btn');
const btnText  = document.getElementById('btn-text');
const spinner  = document.getElementById('btn-spinner');
const errBox   = document.getElementById('login-error');
const errText  = document.getElementById('login-error-text');

function showErr(msg) { errText.textContent = msg; errBox.style.display = 'flex'; }
function hideErr()    { errBox.style.display = 'none'; }
function setLoading(on) {
  loginBtn.disabled = on;
  btnText.style.display   = on ? 'none' : 'inline';
  spinner.style.display   = on ? 'inline-block' : 'none';
}

async function doLogin() {
  hideErr();
  const email    = emailEl.value.trim();
  const password = pwEl.value;
  if (!email || !password) { showErr('Please enter your email and password.'); return; }
  setLoading(true);
  const { ok, user, error } = await login(email, password);
  setLoading(false);
  if (!ok) { showErr(error || 'Login failed.'); pwEl.value = ''; pwEl.focus(); return; }
  window.location.replace('index.html');
}

loginBtn.addEventListener('click', doLogin);
[emailEl, pwEl].forEach(el => el.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); }));

document.getElementById('toggle-pw').addEventListener('click', () => {
  const hidden = pwEl.type === 'password';
  pwEl.type = hidden ? 'text' : 'password';
  document.getElementById('pw-eye-show').style.display = hidden ? 'none' : 'block';
  document.getElementById('pw-eye-hide').style.display = hidden ? 'block' : 'none';
});

document.getElementById('forgot-btn').addEventListener('click', () =>
  showErr('Contact your system administrator to reset your password.'));

// Server health check
async function checkHealth() {
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  try {
    const r = await fetch(ENDPOINTS.ready(), { signal: AbortSignal.timeout(5000) });
    const data = await r.json().catch(() => ({}));
    if (r.ok && data.status === 'ready') {
      dot.style.background = '#3fb950'; txt.textContent = 'Server online';
    } else {
      dot.style.background = '#f0883e'; txt.textContent = 'Server degraded';
    }
  } catch {
    dot.style.background = '#f85149'; txt.textContent = 'Server unreachable';
  }
}
checkHealth();
</script>
</body>
</html>
